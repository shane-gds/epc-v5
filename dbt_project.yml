name: epc_v4
version: 4.0.0
config-version: 2

profile: epc_v4
require-dbt-version: [">=1.10.0", "<2.0.0"]

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: target
clean-targets: ["target", "dbt_packages", "logs"]

vars:
  onsud_release_label: DEC_2025
  identity_address_normaliser_version: identity_address_v2
  identity_eligibility_contract_version: identity_eligibility_v2
  identity_input_algorithm_version: identity_input_v2
  identity_blocking_policy_version: identity_blocking_benchmark_v1
  identity_comparison_model_version: splink_benchmark_v1
  identity_decision_policy_version: identity_decision_uncalibrated_v1
  coordinate_rounding_scale: 3
  coordinate_source_crs: EPSG:27700
  coordinate_target_crs: EPSG:4326
  coordinate_transform_contract_version: bng_wgs84_v1
  coordinate_duckdb_version: v1.5.4
  coordinate_spatial_extension_version: 28db190

models:
  epc_v4:
    audit:
      +schema: audit
      +materialized: table
      +tags: [audit]
    bronze:
      +schema: bronze
      +materialized: incremental
      +tags: [bronze]
    silver:
      +schema: silver
      +materialized: table
      +tags: [silver]
    identity:
      +schema: identity
      +materialized: table
      +tags: [identity]
    intermediate:
      +schema: intermediate
      +materialized: table
      +tags: [intermediate]
    core:
      +schema: core
      +materialized: table
      +tags: [core]
    mart:
      +schema: mart
      +materialized: table
      +tags: [mart]
    graph_export:
      +schema: graph_export
      +materialized: table
      +tags: [graph_export]

seeds:
  epc_v4:
    +schema: reference
    +quote_columns: false
