name: epc_v5
version: 5.0.0
config-version: 2

profile: epc_v5
require-dbt-version: [">=1.10.0", "<2.0.0"]

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: target
clean-targets: ["target", "dbt_packages", "logs"]

vars:
  onsud_release_label: DEC_2025
  identity_address_normaliser_version: identity_address_v2
  identity_eligibility_contract_version: identity_eligibility_v2
  identity_input_algorithm_version: identity_input_v3
  identity_address_selector_contract_version: epc_flat_trap_route_v1
  identity_libpostal_input_contract_version: epc_address_lines_postcode_gb_v1
  identity_libpostal_parser_contract_version: libpostal_uk_flat_v1
  identity_address_component_contract_version: identity_address_components_v1
  identity_blocking_policy_version: identity_blocking_libpostal_v2
  identity_comparison_model_version: splink_benchmark_v2
  identity_decision_policy_version: identity_decision_uncalibrated_v1
  coordinate_rounding_scale: 3
  coordinate_source_crs: EPSG:27700
  coordinate_target_crs: EPSG:4326
  coordinate_transform_contract_version: bng_wgs84_v1
  coordinate_duckdb_version: v1.5.4
  coordinate_spatial_extension_version: 28db190
  lad_reference_release_label: APR_2025
  lpa_reference_release_label: MAY_2025

models:
  epc_v5:
    audit:
      +schema: audit
      +materialized: table
      +tags: [audit]
    silver:
      +schema: silver
      +materialized: table
      +tags: [silver]
    identity:
      +schema: identity
      +materialized: table
      +tags: [identity]
    intermediate:
      +schema: intermediate
      +materialized: table
      +tags: [intermediate]
    core:
      +schema: core
      +materialized: table
      +tags: [core]

seeds:
  epc_v5:
    +schema: reference
    +quote_columns: false
