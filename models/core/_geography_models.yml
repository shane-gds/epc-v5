version: 2

models:
  - name: int_geography_reference_profile
    description: One classified source representation profile per geography type/code/reference release.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [geography_type, geography_code, release_key]
    columns:
      - name: geography_reference_profile_key
        data_tests: [not_null, unique]
      - name: reference_resolution_status
        data_tests:
          - accepted_values:
              arguments:
                values: [UNIQUE, EXACT_DUPLICATE, CONFLICT]

  - name: dim_geography
    description: One official geography type/code/reference-release endpoint from loaded names-and-codes evidence.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [geography_type, geography_code, geography_release_key]
    columns:
      - name: geography_key
        data_tests: [not_null, unique]
      - name: geography_type
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [LAD, LPA]
      - name: geography_code
        data_tests: [not_null]
      - name: geography_name
        data_tests: [not_null]
      - name: geography_release_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: source('audit_ingestion', 'audit_dataset_release')
                field: dataset_release_id
      - name: hierarchy_status
        data_tests:
          - accepted_values:
              arguments:
                values: [NOT_SUPPLIED]
      - name: country_assignment_status
        data_tests:
          - accepted_values:
              arguments:
                values: [NOT_SUPPLIED]
      - name: validity_status
        data_tests:
          - accepted_values:
              arguments:
                values: [NOT_SUPPLIED]
      - name: is_current_release
        data_tests: [not_null]
      - name: reference_resolution_status
        data_tests:
          - accepted_values:
              arguments:
                values: [UNIQUE, EXACT_DUPLICATE]
