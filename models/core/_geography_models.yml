version: 2

models:
  - name: int_geography_reference_profile
    description: |
      [Station 3 (Standardization & Token Normalization)]
      Profiles loaded LAD and LPA names-and-codes observations before they become dimension
      rows. There is one row per geography type, official code, and reference release.

      Use this model to identify unique values, exact duplicates, and conflicting source
      representations. Deterministic representative fields are populated for every profile
      so it can be inspected consistently, including profiles marked as conflicts.

      A representative does not resolve a genuine disagreement. Conflicts remain visible
      here for investigation and are deliberately excluded from `dim_geography`. This model
      is a quality checkpoint, not a reporting dimension.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [geography_type, geography_code, release_key]
    columns:
      - name: geography_reference_profile_key
        data_tests: [not_null, unique]
      - name: reference_resolution_status
        data_tests:
          - accepted_values:
              arguments:
                values: [UNIQUE, EXACT_DUPLICATE, CONFLICT]

  - name: dim_geography
    description: |
      [Station 3 (Standardization & Token Normalization)]
      Provides governed, release-aware reference rows for official geography codes and
      names. There is one row per geography type, official code, and reference release;
      the current implementation includes non-conflicting LAD and LPA evidence.

      Use this model for official labels, release-specific reporting, and future
      entity-to-geography or graph endpoints. Welsh LAD names and LPA co-terminous flags
      are preserved where supplied.

      This is release-versioned but not a full SCD Type 2 dimension because the sources do
      not provide effective intervals. It does not allocate entities, infer geography from
      coordinates, or invent missing hierarchy, country, or validity information.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [geography_type, geography_code, geography_release_key]
    columns:
      - name: geography_key
        data_tests: [not_null, unique]
      - name: geography_type
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [LAD, LPA]
      - name: geography_code
        data_tests: [not_null]
      - name: geography_name
        data_tests: [not_null]
      - name: geography_release_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: source('audit_ingestion', 'audit_dataset_release')
                field: dataset_release_id
      - name: hierarchy_status
        data_tests:
          - accepted_values:
              arguments:
                values: [NOT_SUPPLIED]
      - name: country_assignment_status
        data_tests:
          - accepted_values:
              arguments:
                values: [NOT_SUPPLIED]
      - name: validity_status
        data_tests:
          - accepted_values:
              arguments:
                values: [NOT_SUPPLIED]
      - name: is_current_release
        data_tests: [not_null]
      - name: reference_resolution_status
        data_tests:
          - accepted_values:
              arguments:
                values: [UNIQUE, EXACT_DUPLICATE]
