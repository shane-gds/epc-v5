version: 2

sources:
  - name: bronze_ingestion
    description: Immutable source-shaped rows loaded by the audited external I/O helper.
    schema: bronze
    tables:
      - name: raw_pp_transaction
        description: One supplied HM Land Registry Price Paid Data row.
        loaded_at_field: loaded_at
        columns:
          - name: source_record_key
            data_tests: [not_null, unique]
          - name: source_file_id
            data_tests:
              - not_null
              - relationships:
                  arguments:
                    to: source('audit_ingestion', 'audit_source_file')
                    field: source_file_id
          - name: dataset_release_id
            data_tests:
              - not_null
              - relationships:
                  arguments:
                    to: source('audit_ingestion', 'audit_dataset_release')
                    field: dataset_release_id
          - name: source_row_number
            data_tests: [not_null]
          - name: transaction_id_raw
            data_tests: [not_null]

      - name: raw_epc_certificate
        description: One supplied domestic EPC certificate row from one annual archive member.
        loaded_at_field: loaded_at
        columns:
          - name: source_record_key
            data_tests: [not_null, unique]
          - name: source_file_id
