version: 2

models:
  - name: stg_pp_transaction_observation
    description: |
      Turns accepted HM Land Registry Price Paid Data rows into clean, typed transaction
      observations while keeping the lineage needed to trace every value back to Bronze.

      There is one row per accepted source record and transaction ID. Use this model as
      the prepared evidence for identity matching, sale facts, and transaction analysis
      instead of parsing the raw files again.

      Missing or invalid postcodes stay visible through status fields. The address fields
      help matching, but they do not identify a confirmed premises, owner, tenant, or use.
    columns:
      - name: source_record_key
        data_tests: [not_null, unique]
      - name: transaction_id
        data_tests: [not_null, unique]
      - name: transfer_date
        data_tests: [not_null]
      - name: price_paid
        data_tests: [not_null]
      - name: postcode_parse_status
        data_tests:
          - accepted_values:
              arguments:
                values: [VALID, MISSING, INVALID]
      - name: parse_status
        data_tests:
          - accepted_values:
              arguments:
                values: [VALID]

  - name: stg_epc_certificate_observation
    description: |
      Turns accepted domestic EPC source rows into typed certificate observations. Dates,
      ratings, scores, addresses, UPRNs, and building descriptions are prepared once while
      retaining complete source lineage.

      There is one row per accepted source observation, not necessarily one unique
      certificate number. Repeated certificates are labelled as unique, exact duplicates,
      or conflicts so downstream models do not silently choose between different evidence.

      A supplied UPRN is an observation, not confirmed dwelling identity. The publisher's
      "current" rating describes assessment time and does not mean current today.
    columns:
      - name: source_record_key
        data_tests: [not_null, unique]
      - name: certificate_number
        data_tests: [not_null]
      - name: inspection_date
        data_tests: [not_null]
      - name: lodgement_date
        data_tests: [not_null]
      - name: uprn_parse_status
        data_tests:
          - accepted_values:
              arguments:
                values: [VALID, MISSING, INVALID]
      - name: certificate_conflict_status
        data_tests:
          - accepted_values:
              arguments:
                values: [UNIQUE, EXACT_DUPLICATE, CONFLICT]
      - name: chronology_status
        data_tests:
          - accepted_values:
              arguments:
                values: [VALID, INSPECTION_AFTER_LODGEMENT]

  - name: stg_epc_recommendation_observation
    description: |
      Prepares EPC recommendation rows for item-level facts, future measure mapping, and
      certificate summaries. It keeps the original wording and cautiously extracts only
      supported GBP cost ranges or single values.

      There is one row per accepted recommendation item. Recommendations remain visible
      when their certificate parent is missing or conflicted, with the outcome recorded in
      `parent_status`.

      Parsed costs are only what could be read from the supplied text. They are not quotes,
      actual spend, proof of installation, suitability advice, or exemption evidence.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [certificate_number, improvement_item]
    columns:
      - name: source_record_key
        data_tests: [not_null, unique]
      - name: certificate_number
        data_tests: [not_null]
      - name: improvement_item
        data_tests: [not_null]
      - name: parent_status
        data_tests:
          - accepted_values:
              arguments:
                values: [MATCHED_CERTIFICATE, ORPHAN_CERTIFICATE, CONFLICTING_CERTIFICATE]
      - name: cost_parse_status
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - RANGE_PARSED
                  - SINGLE_VALUE_PARSED
                  - MISSING
                  - BARE_NUMBER_UNSUPPORTED
                  - ENCODING_ERROR
                  - NON_GBP_CURRENCY
                  - UNSUPPORTED_FORMAT
                  - INVALID_BOUNDS
                  - NUMERIC_OVERFLOW

  - name: stg_onsud_uprn_allocation
    description: |
      Creates a narrow, typed, release-aware view of ONSUD UPRN allocations, including
      postcodes, British National Grid coordinates, and selected geography codes.

      There is one distinct allocation tuple per release and UPRN. Exact source duplicates
      are combined and counted, while genuinely different allocations remain as separate
      rows marked `CONFLICT`. Use the source-record bridge when every contributing raw row
      is needed.

      An allocation is valid only for its stated release. It is not automatically the
      latest location or proof that an EPC's observed UPRN identifies a dwelling.
    columns:
      - name: onsud_allocation_key
        data_tests: [not_null, unique]
      - name: dataset_release_id
        data_tests: [not_null]
      - name: uprn
        data_tests: [not_null]
      - name: allocation_status
        data_tests:
          - accepted_values:
              arguments:
                values: [UNIQUE, EXACT_DUPLICATE, CONFLICT]
      - name: postcode_parse_status
        data_tests:
          - accepted_values:
              arguments:
                values: [VALID, MISSING, INVALID]
      - name: coordinate_parse_status
        data_tests:
          - accepted_values:
              arguments:
                values: [VALID, MISSING, PARTIAL, OUT_OF_BOUNDS]

  - name: stg_lad_name_code_reference
    description: |
      Prepares the published Local Authority District names-and-codes file as release-aware
      reference evidence. Official codes, English names, supplied Welsh names, and source
      lineage are retained.

      There is one row per source observation in a registered LAD release. Use the
      downstream reference profile to see whether a code is unique, duplicated, or
      conflicting before it is published to the geography dimension.

      Invalid values remain visible with parse statuses. The source object ID is not a
      durable geography key, and this file does not provide hierarchy or validity dates.
    columns:
      - name: geography_reference_observation_key
        data_tests: [not_null, unique]
      - name: source_record_key
        data_tests: [not_null, unique]
      - name: geography_parse_status
        data_tests:
          - accepted_values:
              arguments:
                values: [VALID, MISSING_CODE, INVALID_CODE, MISSING_NAME]
      - name: object_id_parse_status
        data_tests:
          - accepted_values:
              arguments:
                values: [VALID, MISSING, INVALID]

  - name: stg_lpa_name_code_reference
    description: |
      Prepares the published Local Planning Authority names-and-codes file as release-aware
      reference evidence. It standardises codes and names, interprets valid co-terminous
      flags, and keeps complete source lineage.

      There is one row per source observation in a registered LPA release. Valid rows feed
      the downstream reference profile, where duplicates and conflicts are handled before
      dimension publication.

      Missing or invalid values are reported rather than repaired. This model does not
      infer hierarchy, country, validity dates, or which release should be current.
    columns:
      - name: geography_reference_observation_key
        data_tests: [not_null, unique]
      - name: source_record_key
        data_tests: [not_null, unique]
      - name: geography_parse_status
        data_tests:
          - accepted_values:
              arguments:
                values: [VALID, MISSING_CODE, INVALID_CODE, MISSING_NAME]
      - name: co_terminous_parse_status
        data_tests:
          - accepted_values:
              arguments:
                values: [VALID, MISSING, INVALID]
      - name: object_id_parse_status
        data_tests:
          - accepted_values:
              arguments:
                values: [VALID, MISSING, INVALID]
