version: 2

models:
  - name: int_identity_current_run
    description: |
      Defines the identity run implied by the currently loaded PPD and EPC files together
      with the active matching contract versions. There is exactly one row for the current
      population-and-contract combination.

      Use this model to scope downstream identity work and to find the versions needed to
      interpret its results. The keys are deterministic, so unchanged inputs produce the
      same run definition.

      This is a current-run selector, not an execution log, property identifier, cluster,
      or record of when Splink finished.
    columns:
      - name: identity_run_id
        data_tests: [not_null, unique]
      - name: identity_run_key
        data_tests: [not_null, unique]
      - name: population_fingerprint
        data_tests: [not_null]
      - name: blocking_policy_fingerprint
        data_tests: [not_null]

  - name: identity_run_manifest
    description: |
      Keeps an append-only catalogue of identity populations and the contract versions used
      to process them. There is one row per distinct `identity_run_key`; rebuilding an
      unchanged definition does not add another row.

      Use this model to explain which population, blocking policy, normaliser, comparison
      model, and decision policy produced a piece of identity evidence.

      `registered_at` is when the run definition was first registered, not when scoring
      completed. Run keys and IDs are not entity or cluster identifiers.
    columns:
      - name: identity_run_id
        data_tests: [not_null, unique]
      - name: identity_run_key
        data_tests: [not_null, unique]
      - name: population_fingerprint
        data_tests: [not_null]
      - name: blocking_policy_fingerprint
        data_tests: [not_null]

  - name: int_identity_observation
    description: |
      Presents staged PPD transactions and EPC certificates through one shared identity
      contract while keeping source-specific fields and lineage. There is one accepted
      source record per identity run, including explicitly ineligible observations.

      Use this model for population reconciliation, candidate generation, and versioned
      address-comparison fields. `eligibility_status` explains why a record can or cannot
      enter matching.

      Normalised addresses are matching aids, not corrected source facts. The model does
      not decide matches, invent UPRNs, or identify a premises, building, or dwelling.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [identity_run_key, source_record_key]
    columns:
      - name: identity_observation_key
        data_tests: [not_null]
      - name: identity_run_observation_key
        data_tests: [not_null, unique]
      - name: identity_run_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('identity_run_manifest')
                field: identity_run_id
      - name: source_record_key
        data_tests: [not_null]
      - name: source_dataset
        data_tests:
          - accepted_values:
              arguments:
                values: [PPD, EPC_CERTIFICATE]
      - name: eligibility_status
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - ELIGIBLE
                  - INELIGIBLE_MISSING_ADDRESS
                  - INELIGIBLE_MISSING_POSTCODE
                  - INELIGIBLE_INVALID_POSTCODE
