version: 2

seeds:
  - name: identity_blocking_policy
    description: |
      [Station 4 (Blocking & Candidate Generation)]
      Versioned identity candidate blocking rules and fan-out policy.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [policy_version, rule_code]
    columns:
      - name: policy_version
        data_tests: [not_null]
      - name: rule_code
        data_tests: [not_null]
      - name: rule_logic_version
        data_tests: [not_null]
      - name: evidence_class
        data_tests:
          - accepted_values:
              arguments:
                values: [DIRECT_IDENTIFIER, PROBABILISTIC, BENCHMARK, PROHIBITED]

models:
  - name: identity_scoring_input
    description: |
      [Station 5 (The Detective's Scoring Office)]
      Projects the current run's eligible observations into the compact feature set expected
      by Splink. There is one row per eligible identity observation, with `unique_id` set to
      its run-specific observation key.

      Use this as the input boundary for externally orchestrated candidate scoring. It keeps
      scoring features separate from the wider source observation model.

      Property classes and normalised text are comparison features, not corrected facts.
      This view contains no ineligible rows, historical runs, scores, or decisions.
    columns:
      - name: unique_id
        data_tests: [not_null, unique]
      - name: identity_run_key
        data_tests: [not_null]
      - name: source_dataset
        data_tests: [not_null]

  - name: identity_libpostal_candidate_block_profile
    description: |
      [Station 4 (Blocking & Candidate Generation)]
      Profiles exact postcode, unit, and building-number blocks before the libpostal rescue
      join. There is one block per current identity run and exact component tuple, including
      admitted and explicitly suppressed blocks.

      Side and pair-product limits are taken from the versioned blocking policy. Suppressed
      blocks remain auditable and cannot create candidates in dbt or Splink.
    columns:
      - name: candidate_block_key
        data_tests: [not_null, unique]
      - name: block_status
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - ADMITTED
                  - SUPPRESSED_OVERSIZED_SIDE
                  - SUPPRESSED_OVERSIZED_PRODUCT

  - name: identity_candidate_rule_hit
    description: |
      [Station 4 (Blocking & Candidate Generation)]
      Records why a blocking rule admitted two observations for comparison. There is one
      row per admitting rule, canonical candidate pair, and identity run.

      Use this model to audit candidate provenance and understand the volume produced by
      each blocking rule. Under the current policy, rules are mutually exclusive and each
      candidate pair has one rule hit.

      Admission only means "score this pair". It is not an accepted match, and a shared
      supplied UPRN is still evidence rather than proof of dwelling identity.
    columns:
      - name: candidate_rule_hit_key
        data_tests: [not_null, unique]
      - name: candidate_pair_key
        data_tests: [not_null]
      - name: rule_code
        data_tests: [not_null]
      - name: rule_logic_version
        data_tests: [not_null]

  - name: identity_candidate_pair
    description: |
      [Station 4 (Blocking & Candidate Generation)]
      Provides the canonical observation pairs sent for scoring. There is one unordered
      pair per identity run, with the lower run-observation key stored on the left.

      Use this as the candidate spine when joining blocking evidence, Splink scores,
      decisions, and reconciliation checks.

      Left and right are only lexical positions. A candidate is a plausible comparison,
      not a match, entity, or property relationship.
    columns:
      - name: candidate_pair_key
        data_tests: [not_null, unique]
      - name: run_observation_key_l
        data_tests: [not_null]
      - name: run_observation_key_r
        data_tests: [not_null]
      - name: candidate_status
        data_tests:
          - accepted_values:
              arguments:
                values: [GENERATED]

  - name: identity_candidate_generation_audit
    description: |
      [Station 4 (Blocking & Candidate Generation)]
      Summarises candidate-generation volume and operational checksums for the current
      identity run. There is one row per blocking rule that produced at least one hit.

      Use this model to reconcile candidate counts, spot blocking-policy drift, and compare
      repeat runs without scanning every pair.

      This is a rebuildable current-run audit table rather than historical evidence. Its
      checksums are operational controls, not stable business identifiers.
    columns:
      - name: rule_code
        data_tests: [not_null, unique]
      - name: rule_hit_count
        data_tests: [not_null]
